<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>PS5 Jailbreak</title>
    <style>
      body {
        background-image: url("bg.jpg");
        background-repeat: no-repeat;
        background-size: cover;
        background-color: #1e122b;
        color: #e2d5f0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        text-align: center;
        padding-top: 3vh;
        margin: 0;
      }
      h2 {
        margin-top: 0px;
        margin-bottom: 2vh;
        font-size: 2.5vw;
        font-weight: bold;
        color: #b388ff;
        text-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
      }
      #console {
        font-family: monospace;
        background-color: #120a1c;
        color: #d7c4eb;
        border: 1px solid #4a2875;
        padding: 15px;
        border-radius: 6px;
        margin-top: 2vh;
        margin-left: 15%;
        margin-right: 15%;
        text-align: left;
        height: 65vh; 
        overflow-y: auto;
        font-size: 1.0vw;
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
      }
      .progress-bar-container {
        width: 70%;
        height: 8vh;
        background-color: #180d24;
        border: 2px solid #8e24aa;
        border-radius: 16px;
        margin: 0 auto;
        overflow: hidden;
        position: relative;
        margin-top: 3vh;
        box-shadow: 0 0 15px rgba(142, 36, 170, 0.4);
      }
      #progressLabel {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #fff;
        font-size: 3.5vh;
        font-weight: bold;
        z-index: 1;
        text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
      }
      #progressBar {
        width: 100%;
        height: 100%;
        background-color: #6a1b9a;
        transform-origin: left;
        transform: scaleX(0);
        transition: transform 0.5s ease-in-out;
      }
      footer {
        margin-top: 2.5vh;
        font-size: 0.8vw;
        color: #6a5d77;
      }
    </style>
  </head>
  <body>
    <h2>Y2JB Exploit Mod for PS5 Console 4.03 - 12.70</h2>
    <pre id="console"></pre>
    <div class="progress-bar-container">
      <div id="progressLabel">Loading...</div>
      <div id="progressBar"></div>
    </div>
    <footer>
      Purple Edition v1.1
    </footer>
    <script src="main.js"></script>
  </body>
</html>
